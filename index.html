<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Server</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#eef2f7;
}

/* header */

header{
background:#0f172a;
color:white;
padding:15px;
text-align:center;
}

/* sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#1e293b;
padding-top:70px;
}

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
}

.sidebar a:hover{
background:#334155;
}

/* content */

.content{
margin-left:200px;
padding:20px;
}

/* login */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.login-box{
background:white;
padding:30px;
border-radius:12px;
width:280px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

/* cards */

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header>
<h2>IT Server</h2>
</header>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<h3>Login</h3>

<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<br><br>

<button onclick="bioLogin()">🔐 Biometric Login</button>

<p id="status"></p>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<div class="sidebar">

<a href="#">Home</a>
<a href="#">Servers</a>
<a href="#">Services</a>
<a href="#">Security</a>
<a href="#">Account</a>

</div>

<div class="content">

<div class="card">
<h3>☁ Cloud Server</h3>
<p>Fast scalable cloud hosting.</p>
</div>

<div class="card">
<h3>🖥 Dedicated Server</h3>
<p>High performance servers.</p>
</div>

<div class="card">
<h3>🔒 Server Security</h3>
<p>Advanced monitoring system.</p>
</div>

<div class="card">
<h3>📞 24/7 Support</h3>
<p>Technical support anytime.</p>
</div>

</div>

</div>

<script>

function login(){

var u=document.getElementById("user").value;
var p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

alert("Wrong login");

}

}

function bioLogin(){

if(window.PublicKeyCredential){

document.getElementById("status").innerText="Biometric supported on this device";

}else{

document.getElementById("status").innerText="Biometric not supported";

}

}

</script>

</body>
</html>
